{% load i18n %}

<form method="post" data-csrf-form>
    {# CSRF token is populated by JS from the cookie at submit time; baking it here would be cached by the CDN and 403 (see utils/csrf.js). #}
    <input type="hidden" name="csrfmiddlewaretoken" value="" data-csrf-field>
    <button
        type="submit"
        name="action"
        value="skip"
        class="btn btn-link skip-button"
        data-label="Maybe later">
        {% trans "Maybe later" %}
    </button>
</form>
