{% load wagtailcore_tags %}

<div class="two-column-container two-column-container--{{ self.vertical_alignment }}{% if not self.right_column %} two-column-container--left-only{% endif %}">

  <div class="two-column-container__column two-column-container__column--left">
    {% for block in self.left_column %}
      {% include_block block %}
    {% endfor %}
  </div>

  {% if self.right_column %}
    <div class="two-column-container__column two-column-container__column--right">
      {% for block in self.right_column %}
        {% include_block block %}
      {% endfor %}
    </div>
  {% endif %}

</div>
