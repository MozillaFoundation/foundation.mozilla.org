{% load static i18n l10n %}
{% load wagtailcore_tags %}

<div class="share-container">
  {% if show_title != False %}
    {% trans "Share this!" as share_this %}
    <div class="share-title">{{ title|default:share_this }}</div>
  {% endif %}
  <div class="share-buttons">
    {% if petition_cta.sosha_toolkit_embed_code %}
        <div class="petition__share-button-wrapper">
            {{ petition_cta.sosha_toolkit_embed_code|safe }}
        </div>
    {% endif %}
  </div>
