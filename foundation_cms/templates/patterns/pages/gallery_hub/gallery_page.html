{% extends theme_base %}

{% load wagtailimages_tags static i18n %}

{% block content %}
    <main>
        <article>
            <div class="grid-container">
                <div class="grid-x grid-margin-x">
                    <div class="cell small-12 medium-12">
                        <h2>{{ page.title }}</h2>
                    </div>
                </div>
            </div>

            {% if page.body %}
                {% include "patterns/components/streamfield.html" with streamfield=page.body %}
            {% endif %}

        </article>
    </main>
{% endblock content %}
